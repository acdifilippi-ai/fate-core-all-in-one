// ── Firebase session hook ─────────────────────────────────────────────────────
function useFirebaseSession(sessionCode) {
  const [gameState, setGameState] = useState(null);
  const [syncStatus, setSyncStatus] = useState("connecting");
  const isLocalWrite = useRef(false);
  const writeTimer = useRef(null);

  useEffect(() => {
    if (!sessionCode) return;
    setGameState(null);
    setSyncStatus("connecting");
    const sessionRef = ref(db, `sessions/${sessionCode}`);
    const unsub = onValue(sessionRef, snap => {
      const val = snap.val();
      if (val) {
        // Only accept remote updates if we're not mid-write
        if (!isLocalWrite.current) {
          setGameState(val);
        }
        setSyncStatus("live");
      } else {
        // Session exists but empty — write default state
        const init = defaultState();
        set(sessionRef, init).then(() => {
          setGameState(init);
          setSyncStatus("live");
        }).catch(() => setSyncStatus("error"));
      }
    }, () => setSyncStatus("error"));
    return () => unsub();
  }, [sessionCode]);

  const updateState = useCallback(updater => {
    setGameState(prev => {
      if (!prev) return prev;
      const next = typeof updater === "function" ? updater(prev) : updater;
      isLocalWrite.current = true;
      setSyncStatus("syncing");
      if (writeTimer.current) clearTimeout(writeTimer.current);
      writeTimer.current = setTimeout(async () => {
        try {
          await set(ref(db, `sessions/${sessionCode}`), next);
          setSyncStatus("live");
        } catch(e) { setSyncStatus("error"); }
        isLocalWrite.current = false;
      }, 500);
      return next;
    });
  }, [sessionCode]);

  return { gameState, updateState, syncStatus };
}

// ── Lobby ─────────────────────────────────────────────────────────────────────
function Lobby({ onJoin }) {
  const [mode, setMode] = useState(null);
  const [code, setCode] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);

  const createSession = async () => {
    setLoading(true);
    const sessionCode = genCode();
    try {
      await set(ref(db, `sessions/${sessionCode}`), defaultState());
      onJoin(sessionCode);
    } catch(e) { setError("Failed to create session."); setLoading(false); }
  };

  const joinSession = async () => {
    const c = code.trim().toUpperCase();
    if (!c) { setError("Enter a session code."); return; }
    setLoading(true);
    try {
      const snap = await get(ref(db, `sessions/${c}`));
      if (!snap.exists()) { setError("Session not found."); setLoading(false); return; }
      onJoin(c);
    } catch(e) { setError("Could not connect."); setLoading(false); }
  };

  const inp = {width:"100%",border:`1px solid #dde3e8`,borderRadius:4,padding:"10px",
    fontSize:18,fontWeight:800,textAlign:"center",letterSpacing:3,outline:"none",
    fontFamily:"inherit"};
  const btn = (bg,col)=>({background:bg,color:col||C.header,border:"none",borderRadius:6,
    padding:"12px",fontSize:14,fontWeight:700,width:"100%",cursor:"pointer",marginBottom:8,fontFamily:"inherit"});

  return React.createElement("div",{style:{minHeight:"100vh",background:C.header,display:"flex",
    alignItems:"center",justifyContent:"center"}},
    React.createElement("div",{style:{background:"#fff",borderRadius:16,padding:40,width:360,
      boxShadow:"0 20px 60px rgba(0,0,0,0.4)",textAlign:"center",borderTop:`4px solid ${C.accent}`}},
      React.createElement("div",{style:{width:56,height:56,background:C.accent,borderRadius:12,
        display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:28,
        color:C.header,margin:"0 auto 16px"}},"F"),
      React.createElement("h1",{style:{fontSize:22,fontWeight:800,letterSpacing:1,color:C.header,marginBottom:4}},"FATE CORE"),
      React.createElement("p",{style:{color:C.muted,fontSize:13,marginBottom:28}},"GM Dashboard"),
      !mode && React.createElement(React.Fragment,null,
        React.createElement("button",{style:btn(C.accent),onClick:createSession,disabled:loading},loading?"Creating…":"🎲 Create New Session"),
        React.createElement("button",{style:{...btn(C.header),color:"#fff"},onClick:()=>setMode("join")},"🔗 Join Existing Session")
      ),
      mode==="join" && React.createElement(React.Fragment,null,
        React.createElement("p",{style:{color:C.muted,fontSize:13,marginBottom:16}},"Enter the session code from your GM."),
        React.createElement("input",{value:code,onChange:e=>setCode(e.target.value.toUpperCase()),
          placeholder:"FATE-XXXX",maxLength:9,style:inp,
          onKeyDown:e=>e.key==="Enter"&&joinSession()}),
        error&&React.createElement("p",{style:{color:C.red,fontSize:12,margin:"8px 0"}},error),
        React.createElement("button",{style:{...btn(C.accent),marginTop:12},onClick:joinSession,disabled:loading},loading?"Joining…":"Join Session"),
        React.createElement("button",{style:{...btn("#eee"),color:C.muted},onClick:()=>{setMode(null);setError("");setCode("");}},"Back")
      )
    )
  );
}

// ── SyncBadge ─────────────────────────────────────────────────────────────────
function SyncBadge({status,code}) {
  const cfg={connecting:{bg:"#f0c040",t:"#7a5c00",l:"Connecting…"},

// ── Die ───────────────────────────────────────────────────────────────────────
function Die({face,index,rolling}) {
  const col=face==="+"?C.accent:face==="-"?C.red:"#4a5568";
  const sym=face==="+"?"+":face==="-"?"−":"○";
  return React.createElement("div",{
    className:rolling?`dr${index}`:"",
    style:{width:52,height:52,borderRadius:10,flexShrink:0,
      background:`linear-gradient(145deg,${col}ee,${col}99)`,border:`2px solid ${col}`,

      display:"flex",alignItems:"center",justifyContent:"center",
      fontSize:26,fontWeight:900,color:"#fff",userSelect:"none",
      opacity:rolling?0:1,transition:rolling?"none":"all 0.2s ease"}},sym);
}
function DiceRow({faces,animKey,rolling}) {
  return React.createElement("div",{style:{display:"flex",gap:12,justifyContent:"center",minHeight:60,alignItems:"center"}},
    faces.map((f,i)=>React.createElement(Die,{key:`${animKey}-${i}`,face:f,index:i,rolling})));
}
function useDiceRoller() {
  const [st,setSt]=useState({faces:["","","",""],rolling:false,result:null,animKey:0,history:[]});
  const doRoll=(bonus=0,tierLabel="Plain Roll",pcName="",onDone)=>{
    setSt(s=>({...s,rolling:true,result:null,animKey:s.animKey+1}));
    setTimeout(()=>{
      const d=roll4dF();
      const dsum=d.reduce((a,f)=>a+diceVal(f),0);
      const total=dsum+bonus;
      const r={dice:d,diceSum:dsum,bonus,total,tierLabel,pcName,ts:new Date().toLocaleTimeString()};
      setSt(s=>({faces:d,rolling:false,result:r,animKey:s.animKey,history:[r,...s.history].slice(0,12)}));
      if(onDone) onDone(r);
    },1100);
  };
  return {...st,doRoll};
}

function SkillPyramid({skills,onChange,onRoll,pcName}) {
  const used=skills.flat().filter(Boolean);
  return e("div",null,
    PYRAMID.map((row,ri)=>e("div",{key:ri,style:{display:"flex",alignItems:"center",gap:6,marginBottom:5}},

        row.label+" 🎲"),
      skills[ri].map((val,si)=>{

}

  const togAB=(i,bi)=>{const a=[...scene.aspects];const b=[...a[i].boxes];b[bi]=!b[bi];a[i]={...a[i],boxes:b};upd({aspects:a});};
  const addZ=()=>upd({zones:[...scene.zones,""]});
  const remZ=i=>upd({zones:scene.zones.filter((_,j)=>j!==i)});

          e("div",{style:{display:"flex",gap:3,flexShrink:0}},

// ── App ───────────────────────────────────────────────────────────────────────
const TABS=["Party","Scene","NPCs","Reference"];
function App() {
  const [sessionCode,setSessionCode]=useState(null);
  const [tab,setTab]=useState("Party");
  const [modalOpen,setModalOpen]=useState(false);
  const roller=useDiceRoller();
  const {gameState,updateState,syncStatus}=useFirebaseSession(sessionCode);

  const handleRoll=(bonus,tierLabel,pcName,onDone)=>{
    roller.doRoll(bonus,tierLabel,pcName,onDone);
    setModalOpen(true);
  };

  if(!sessionCode) return e(Lobby,{onJoin:code=>setSessionCode(code)});
  if(!gameState) return e("div",{style:{minHeight:"100vh",background:C.header,display:"flex",
    flexDirection:"column",alignItems:"center",justifyContent:"center",color:"#fff",gap:16}},
    e("div",{style:{width:48,height:48,background:C.accent,borderRadius:10,display:"flex",
      alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:24,color:C.header}},"F"),
    e("div",{style:{fontSize:16,color:"#8fa8c0"}},"Connecting to session…"),
    e("div",{style:{fontSize:12,color:"#4a6080"}},"Session: "+sessionCode)
  );

  const {pcs,npcs,scene,gmFate}=gameState;
  const tabBtn=(t)=>e("button",{key:t,
    style:{padding:"10px 16px",cursor:"pointer",fontWeight:600,fontSize:13,
      color:tab===t?C.accent:"#8fa8c0",background:"none",border:"none",
      borderBottom:tab===t?`2px solid ${C.accent}`:"2px solid transparent",fontFamily:"inherit"},
    onClick:()=>setTab(t)},t);

  return e("div",{style:{fontFamily:"'Segoe UI',system-ui,sans-serif",background:C.bg,minHeight:"100vh",color:C.text}},
    e("div",{style:{background:C.header,color:"#fff",padding:"12px 20px",display:"flex",
      alignItems:"center",gap:12,borderBottom:`3px solid ${C.accent}`}},
      e("div",{style:{width:32,height:32,background:C.accent,borderRadius:6,display:"flex",
        alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:18,color:C.header,flexShrink:0}},"F"),
      e("div",null,
        e("div",{style:{margin:0,fontSize:17,fontWeight:800,letterSpacing:1.5,textTransform:"uppercase"}},"Fate Core"),
        e("div",{style:{fontSize:11,color:"#8fa8c0",marginTop:1}},"GM Dashboard")
      ),
      e(SyncBadge,{status:syncStatus,code:sessionCode})
    ),
    e("div",{style:{display:"flex",background:C.header,padding:"0 16px",borderBottom:"1px solid #2a3f55"}},
      TABS.map(tabBtn)
    ),
    e("div",{style:{padding:16,maxWidth:1200,margin:"0 auto"}},
      e("div",{style:{display:tab==="Party"?"block":"none"}},e(PartyTab,{pcs,update:updateState,onRoll:handleRoll})),
      e("div",{style:{display:tab==="Scene"?"block":"none"}},e(SceneTab,{scene,update:updateState})),
      e("div",{style:{display:tab==="NPCs"?"block":"none"}},e(NPCTab,{npcs,update:updateState,onRoll:handleRoll})),
      e("div",{style:{display:tab==="Reference"?"block":"none"}},e(ReferenceTab,{pcs,gmFate,update:updateState,roller}))
    ),
    modalOpen && e("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",
      display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000},
      onClick:()=>{if(!roller.rolling)setModalOpen(false);}},
      e("div",{style:{background:"#fff",borderRadius:14,padding:32,minWidth:340,
        boxShadow:"0 12px 48px rgba(0,0,0,0.35)",textAlign:"center",
        borderTop:`4px solid ${C.accent}`},onClick:ev=>ev.stopPropagation()},
        roller.result&&e("div",{style:{fontSize:13,color:C.muted,marginBottom:12,fontWeight:600}},
          roller.result.pcName+" — "+roller.result.tierLabel),
        e(DiceRow,{faces:roller.rolling?["","","",""]:roller.faces,animKey:roller.animKey,rolling:roller.rolling}),
        !roller.rolling&&e(React.Fragment,null,
          roller.result&&e("div",{style:{marginTop:12}},
            roller.result.bonus!==0&&e("div",{style:{fontSize:12,color:C.muted,textAlign:"center"}},
              `Dice ${roller.result.diceSum>=0?"+":""}${roller.result.diceSum} + Skill ${roller.result.bonus>=0?"+":""}${roller.result.bonus}`),
            e("div",{style:{fontSize:38,fontWeight:900,textAlign:"center",lineHeight:1,marginTop:4,
              color:roller.result.total>=4?C.accent:roller.result.total<0?C.red:C.text}},
              (roller.result.total>=0?"+":"")+roller.result.total),
            e("div",{style:{fontSize:17,fontWeight:700,textAlign:"center",marginTop:3,
              color:roller.result.total>=4?C.accent:roller.result.total<0?C.red:C.text}},
              ladderName(roller.result.total))

          e("button",{style:{background:C.accent,color:C.header,border:"none",borderRadius:4,
            padding:"6px 12px",cursor:"pointer",fontSize:12,fontWeight:700,marginTop:20,fontFamily:"inherit"},
            onClick:()=>setModalOpen(false)},"Close")
        )
      )
    )
  );
}

createRoot(document.getElementById("root")).render(e(App));
</script>
</body>
